<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example Test App</title>
    <style>
        html, head, body {
            width: 100vw;
            height: 100vh;
            background: #404040;
            margin: 0;
            padding: 0;
            color: white;
            font-family: Roboto, Arial, Helvetica, sans-serif, monospace;
        }

        app-list {
            width: 90%;
            height: fit-content;
            background: #606060;
            margin-left: auto;
            margin-right: auto;
            margin-top: 32px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 2.5vh;
            padding-top: 5%;
            padding-bottom: 5%;
            flex-direction: column;
            border-radius: 10vw;
        }

        app-list[compact=true] {
            min-height: 10%;
            gap: 1.25vh
        }

        app-list > app-item {
            width: 90%;
            height: 10vh;
            background: #202020;
            display: flex;
            border-radius: 5vw;
            align-items: center;
            justify-content: center;
            flex-direction: row;
            gap: 5%;
        }

        app-list[compact=true] > app-item {
            height: 5vh;
        }

        app-list img {
            width: min(7.5vh, 50%);
            aspect-ratio: 1;
        }

        app-list[compact=true] img {
            width: min(2.5vh, 50%);
        }

        app-item > .titlebox {
            height: 75%;
            width: 50%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            flex-direction: column;
        }

        .titlebox > .title {
            max-height: 75%;
            width: 100%;
            font-weight: bold;
            font-size: 75%;
        }

        .titlebox > .subtitle {
            min-height: 25%;
            height: fit-content;
            width: 100%;
            font-size: 50%;
        }
    
        app-item { display: none }
    </style>
    <app-item>
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAFUlEQVR4nGNoaGj4TwxmGFXYQFeFAKTF+Z0xgo/rAAAAAElFTkSuQmCC"/>
        <div class="titlebox">
            <span class="title">$name</span>
            <span class="subtitle">$desc</span>
        </div>
    </app-item>
</head>
<body>
    <app-list>
    </app-list>
    <script>
        const appList = document.querySelector("app-list");
        const initialItem = document.querySelector("app-item");

        const toggleCompactMode = () => appList.setAttribute("compact", appList.getAttribute("compact") == "true" ? "false": "true");

        const populateAppList = store => {
            store.forEach(value => {
                var appItem = initialItem.cloneNode(true);

                if (value.hasOwnProperty("icon")) appItem.querySelector("img").src = value["icon"];
                if (value.hasOwnProperty("name")) appItem.querySelector(".title").innerText = value["name"];
                if (value.hasOwnProperty("creation") | value.hasOwnProperty("description") |
                    value.hasOwnProperty("dateofcreation"))
                        appItem.querySelector(".subtitle").innerText =
                            value.hasOwnProperty("description") ? value["description"] + "\n" : "" +
                            `Created ${value.hasOwnProperty("dateofcreation") ? "by " + value["creator"] : ""}` +
                            value.hasOwnProperty("dateofcreation") ? `on ${value["dateofcreation"]}` : "";
                appList.append(appItem);
            });
        }

        const repository = "https://pid-j.github.io/Toast"; // Change it for different repos!
        const storePromise = (async () => {return await fetch(`${repository}/apps/store.json`, {
            "credentials": "omit",
            "headers": {
                "Accept": "*",
                "Upgrade-Insecure-Requests": "1",
                "Sec-Fetch-Dest": "document",
                "Sec-Fetch-Mode": "navigate",
                "Sec-Fetch-Site": "cross-site",
                "Priority": "u=0, i"
            },
            "referrer": `${repository}/apps/store.json`,
            "method": "GET",
            "mode": "cors"
        }).then(async value => {populateAppList(await value.json())})})();
    </script>
</body>
</html>
